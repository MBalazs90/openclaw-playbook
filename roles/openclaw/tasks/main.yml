---
# =============================================================================
# OpenClaw — full deployment on a fresh Ubuntu server
# =============================================================================

# --------------- System prerequisites ----------------------------------------
- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600
  become: true

- name: Install base packages
  ansible.builtin.apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
      - git
      - ufw
    state: present
  become: true

# --------------- Swap (keeps Docker build from OOM-killing on small VMs) -----
- name: Check if swap file exists
  ansible.builtin.stat:
    path: /swapfile
  register: swap_file

- name: Create swap file
  ansible.builtin.command: "fallocate -l {{ swap_size_mb }}M /swapfile"
  changed_when: true
  when: not swap_file.stat.exists
  become: true

- name: Set swap file permissions
  ansible.builtin.file:
    path: /swapfile
    mode: "0600"
  when: not swap_file.stat.exists
  become: true

- name: Format swap file
  ansible.builtin.command: mkswap /swapfile
  changed_when: true
  when: not swap_file.stat.exists
  become: true

- name: Enable swap file
  ansible.builtin.command: swapon /swapfile
  changed_when: true
  when: not swap_file.stat.exists
  become: true

- name: Persist swap in fstab
  ansible.builtin.lineinfile:
    path: /etc/fstab
    line: "/swapfile none swap sw 0 0"
    state: present
  become: true

# --------------- Firewall ----------------------------------------------------
- name: Set UFW default deny incoming
  community.general.ufw:
    direction: incoming
    policy: deny
  become: true

- name: Set UFW default allow outgoing
  community.general.ufw:
    direction: outgoing
    policy: allow
  become: true

- name: Allow required ports through UFW
  community.general.ufw:
    rule: allow
    port: "{{ item.split('/')[0] }}"
    proto: "{{ item.split('/')[1] }}"
  loop: "{{ firewall_allowed_ports }}"
  become: true

# Keep port 22 open during first run so Ansible doesn't get locked out
# before sshd restarts on the new port. Removed in post_tasks after sshd restart.
- name: Temporarily keep port 22 open
  community.general.ufw:
    rule: allow
    port: "22"
    proto: tcp
  become: true
  when: ssh_port | int != 22

- name: Enable UFW
  community.general.ufw:
    state: enabled
  become: true

# --------------- Docker ------------------------------------------------------
- name: Add Docker GPG key
  ansible.builtin.apt_key:
    url: https://download.docker.com/linux/ubuntu/gpg
    state: present
  become: true

- name: Add Docker repository
  ansible.builtin.apt_repository:
    repo: "deb [arch={{ 'arm64' if ansible_facts['architecture'] == 'aarch64' else 'amd64' }}] https://download.docker.com/linux/ubuntu {{ ansible_facts['distribution_release'] }} stable"
    state: present
  become: true

- name: Install Docker Engine
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-compose-plugin
    state: present
    update_cache: true
  become: true

- name: Ensure Docker is running
  ansible.builtin.service:
    name: docker
    state: started
    enabled: true
  become: true

- name: Add openclaw user to docker group
  ansible.builtin.user:
    name: openclaw
    groups: docker
    append: true
  become: true

- name: Install docker Python SDK (for Ansible docker modules)
  ansible.builtin.apt:
    name:
      - python3-docker
    state: present
  become: true

# --------------- Ensure openclaw user owns install dir -----------------------
- name: Create install directory
  ansible.builtin.file:
    path: "{{ openclaw_install_dir }}"
    state: directory
    owner: openclaw
    group: openclaw
    mode: "0755"
  become: true

- name: Set ownership of install directory recursively
  ansible.builtin.file:
    path: "{{ openclaw_install_dir }}"
    owner: openclaw
    group: openclaw
    recurse: true
  become: true
  changed_when: false

- name: Mark install dir as git safe directory for openclaw user
  community.general.git_config:
    name: safe.directory
    value: "{{ openclaw_install_dir }}"
    scope: global
  become: true
  become_user: openclaw

# --------------- Clone / update repo -----------------------------------------
- name: Clone openclaw repository
  ansible.builtin.git:
    repo: "{{ openclaw_repo }}"
    dest: "{{ openclaw_install_dir }}"
    version: "{{ openclaw_branch }}"
    force: true
  become: true
  become_user: openclaw

# --------------- Persistent directories --------------------------------------
- name: Create data directories (owned by container node user uid 1000)
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
    owner: "1000"
    group: "1000"
  loop:
    - "{{ openclaw_config_dir }}"
    - "{{ openclaw_workspace_dir }}"
  become: true

# Subdirs inside the config volume that the container's node user (uid 1000) writes to
- name: Create container-writable subdirectories
  ansible.builtin.file:
    path: "{{ openclaw_config_dir }}/{{ item }}"
    state: directory
    mode: "0755"
    owner: "1000"
    group: "1000"
  loop:
    - canvas
    - cron
    - logs
  become: true

# --------------- Environment file --------------------------------------------
- name: Deploy .env file
  ansible.builtin.template:
    src: env.j2
    dest: "{{ openclaw_install_dir }}/.env"
    owner: openclaw
    group: openclaw
    mode: "0600"
  become: true
  notify: Restart openclaw

# --------------- OpenClaw config (Kimi 2.5 as default model) -----------------
# Owner must be uid 1000 (node user inside container) so the CLI can write to it
- name: Deploy openclaw.json
  ansible.builtin.template:
    src: openclaw.json.j2
    dest: "{{ openclaw_config_dir }}/openclaw.json"
    owner: "1000"
    group: "1000"
    mode: "0644"
  become: true
  notify: Restart openclaw

# --------------- Bind Docker ports to localhost only --------------------------
# Prevents Docker from bypassing UFW on the public interface.
# Tailscale Serve proxies HTTPS to localhost:18789.
- name: Patch docker-compose.yml to bind ports to localhost
  ansible.builtin.replace:
    path: "{{ openclaw_install_dir }}/docker-compose.yml"
    regexp: '"(\$\{OPENCLAW_GATEWAY_PORT:-18789\}):18789"'
    replace: '"127.0.0.1:${OPENCLAW_GATEWAY_PORT:-18789}:18789"'
  become: true
  become_user: openclaw
  notify: Restart openclaw

- name: Patch docker-compose.yml to bind bridge port to localhost
  ansible.builtin.replace:
    path: "{{ openclaw_install_dir }}/docker-compose.yml"
    regexp: '"(\$\{OPENCLAW_BRIDGE_PORT:-18790\}):18790"'
    replace: '"127.0.0.1:${OPENCLAW_BRIDGE_PORT:-18790}:18790"'
  become: true
  become_user: openclaw
  notify: Restart openclaw

- name: Patch docker-compose.yml to use trusted-proxy auth
  ansible.builtin.replace:
    path: "{{ openclaw_install_dir }}/docker-compose.yml"
    regexp: '("--port",\n\s*"18789",)'
    replace: |
      \1
            "--auth",
            "trusted-proxy",
  become: true
  become_user: openclaw
  notify: Restart openclaw

# Note: the gateway inside the container must bind to 0.0.0.0 (lan) so Docker
# port-forwarding works. Security is enforced by binding the *host* port to
# 127.0.0.1 (see port mapping patches above) and UFW denying all inbound.

- name: Inject model provider env vars into docker-compose services
  ansible.builtin.replace:
    path: "{{ openclaw_install_dir }}/docker-compose.yml"
    regexp: '(      TZ: \$\{OPENCLAW_TZ:-UTC\})'
    replace: |
      \1
            MOONSHOT_API_KEY: ${MOONSHOT_API_KEY:-}
            ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
            OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  become: true
  become_user: openclaw
  notify: Restart openclaw

# --------------- Build Docker image (BuildKit required for --mount) ----------
- name: Build openclaw Docker image
  ansible.builtin.command:
    cmd: >
      docker build
      -t {{ openclaw_image_name }}:{{ openclaw_image_tag }}
      --build-arg OPENCLAW_INSTALL_BROWSER={{ '1' if openclaw_install_browser else '' }}
      {{ openclaw_install_dir }}
  environment:
    DOCKER_BUILDKIT: "1"
  become: true
  changed_when: true

# --------------- Start services ----------------------------------------------
- name: Start openclaw via docker compose
  community.docker.docker_compose_v2:
    project_src: "{{ openclaw_install_dir }}"
    state: present
  become: true
  become_user: openclaw
  environment:
    OPENCLAW_IMAGE: "{{ openclaw_image_name }}:{{ openclaw_image_tag }}"
    OPENCLAW_CONFIG_DIR: "{{ openclaw_config_dir }}"
    OPENCLAW_WORKSPACE_DIR: "{{ openclaw_workspace_dir }}"
    OPENCLAW_GATEWAY_TOKEN: "{{ openclaw_gateway_token }}"
    OPENCLAW_GATEWAY_PORT: "{{ openclaw_gateway_port | string }}"
    OPENCLAW_BRIDGE_PORT: "{{ openclaw_bridge_port | string }}"
    OPENCLAW_GATEWAY_BIND: "{{ openclaw_gateway_bind }}"
    MOONSHOT_API_KEY: "{{ moonshot_api_key }}"
    ANTHROPIC_API_KEY: "{{ anthropic_api_key }}"
    OPENAI_API_KEY: "{{ openai_api_key }}"

# --------------- Health check ------------------------------------------------
- name: Wait for gateway to be reachable
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: "{{ openclaw_gateway_port }}"
    timeout: 120
  become: true
